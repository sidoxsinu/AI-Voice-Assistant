<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voice-First Task Assistant</title>
  <style>
    :root {
      --bg: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.25);
      --border: rgba(255, 255, 255, 0.15);
      --text: #f8fafc;
      --primary: #3b82f6;
      --red: #ef4444;
      --gray: #64748b;
      --success: #10b981;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: linear-gradient(rgba(15, 23, 42, 0.6), rgba(15, 23, 42, 0.7)), url('images/pexels-caleb-falkenhagen-216813613-35362080.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }

    /* Glassmorphism utility */
    .glass {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
    }

    .container {
      width: 100%;
      max-width: 600px;
      padding: 2rem;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      animation: float 6s ease-in-out infinite;
    }

    @keyframes float {
      0% {
        transform: translateY(0px);
      }

      50% {
        transform: translateY(-8px);
      }

      100% {
        transform: translateY(0px);
      }
    }

    /* Mic Button */
    .mic-button {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: none;
      background: var(--gray);
      color: white;
      font-size: 3rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
    }

    .mic-button:hover {
      transform: scale(1.05);
    }

    .mic-button:active {
      transform: scale(0.95);
    }

    .mic-button.recording {
      background: var(--red);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% {
        box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7);
      }

      70% {
        box-shadow: 0 0 0 25px rgba(239, 68, 68, 0);
      }

      100% {
        box-shadow: 0 0 0 0 rgba(239, 68, 68, 0);
      }
    }

    /* Status Text */
    .status-text {
      font-size: 1.25rem;
      font-weight: 500;
      color: var(--primary);
      min-height: 1.5rem;
    }

    /* Transcript Card */
    .transcript-box {
      width: 100%;
      padding: 1.5rem;
      min-height: 100px;
      text-align: left;
      font-size: 1.1rem;
      line-height: 1.5;
      color: #cbd5e1;
    }

    /* Email Preview */
    .email-preview {
      width: 100%;
      padding: 1.5rem;
      text-align: left;
      display: none;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .preview-row {
      margin-bottom: 1rem;
    }

    .preview-label {
      font-size: 0.85rem;
      color: var(--gray);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 0.25rem;
      font-weight: 600;
    }

    .preview-value {
      font-size: 1.1rem;
    }

    .preview-body {
      background: rgba(0, 0, 0, 0.2);
      padding: 1rem;
      border-radius: 8px;
      margin-top: 0.5rem;
      font-size: 0.95rem;
      line-height: 1.6;
    }

    /* Actions */
    .actions {
      display: flex;
      gap: 1rem;
      width: 100%;
      margin-top: 1rem;
    }

    .btn {
      flex: 1;
      padding: 1rem;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn:hover {
      opacity: 0.9;
    }

    .btn.confirm {
      background: var(--primary);
      color: white;
    }

    .btn.cancel {
      background: transparent;
      border: 1px solid var(--border);
      color: white;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      padding: 1rem 2rem;
      border-radius: 30px;
      background: var(--success);
      color: white;
      font-weight: 600;
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      z-index: 1000;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    .toast.error {
      background: var(--red);
    }

    /* Summary Card */
    .summary-card {
      display: none;
      margin-top: 1rem;
    }

    /* Todo Panel */
    .todo-panel {
      position: absolute;
      right: 20px;
      top: 20px;
      width: 300px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 1.5rem;
      animation: float 7s ease-in-out infinite;
    }

    .todo-panel h3 {
      margin-top: 0;
      margin-bottom: 1rem;
      font-size: 1.1rem;
    }

    .todo-item {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      margin-bottom: 10px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      font-size: 0.9rem;
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://js.puter.com/v2/"></script>
</head>

<body>

  <div class="todo-panel glass" id="todoPanel">
    <h3>To-Do List</h3>
    <div id="todoList"></div>
    <button class="btn" id="clearTodoBtn"
      style="margin-top: 10px; width: 100%; border: 1px solid rgba(255,255,255,0.2); background: transparent; padding: 0.5rem; font-size: 0.85rem;">Refresh
      / Clear All</button>
  </div>

  <div class="container">
    <button class="mic-button" id="micBtn" title="Click to start">🎙️</button>
    <div class="status-text" id="statusText">Ready</div>

    <div class="glass transcript-box" id="transcriptBox">
      <span class="placeholder">Your voice command will appear here...</span>
    </div>

    <!-- Email Card -->
    <div class="glass email-preview" id="emailPreview">
      <div class="preview-row">
        <div class="preview-label">To</div>
        <div class="preview-value" id="previewTo" contenteditable="true"
          style="padding: 2px 4px; border-bottom: 1px dashed rgba(255,255,255,0.4); outline: none;">-</div>
      </div>
      <div class="preview-row">
        <div class="preview-label">Subject</div>
        <div class="preview-value" id="previewSubject" contenteditable="true"
          style="padding: 2px 4px; border-bottom: 1px dashed rgba(255,255,255,0.4); outline: none;">-</div>
      </div>
      <div class="preview-row">
        <div class="preview-label">Body</div>
        <div class="preview-body" id="previewBody" contenteditable="true"
          style="border: 1px dashed rgba(255,255,255,0.4); outline: none;">-</div>
      </div>

      <div class="actions">
        <button class="btn cancel" id="cancelBtn">Cancel</button>
        <button class="btn confirm" id="confirmBtn">Send Email</button>
      </div>
    </div>

    <!-- Summary Card -->
    <div class="glass summary-card" id="summaryCard">
      <div class="preview-row">
        <div class="preview-label">Clipboard Summary</div>
        <div class="preview-body" id="summaryBody">-</div>
      </div>
      <div class="actions">
        <button class="btn cancel" id="summaryCancelBtn">Close</button>
        <button class="btn confirm" id="summaryCopyBtn">Copy</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">Notification</div>

  <audio id="ttsAudio"></audio>

  <script>
    const micBtn = document.getElementById('micBtn');
    const statusText = document.getElementById('statusText');
    const transcriptBox = document.getElementById('transcriptBox');
    const emailPreview = document.getElementById('emailPreview');
    const previewTo = document.getElementById('previewTo');
    const previewSubject = document.getElementById('previewSubject');
    const previewBody = document.getElementById('previewBody');
    const cancelBtn = document.getElementById('cancelBtn');
    const confirmBtn = document.getElementById('confirmBtn');
    const toast = document.getElementById('toast');
    const ttsAudio = document.getElementById('ttsAudio');

    const summaryCard = document.getElementById('summaryCard');
    const summaryBody = document.getElementById('summaryBody');
    const summaryCancelBtn = document.getElementById('summaryCancelBtn');
    const summaryCopyBtn = document.getElementById('summaryCopyBtn');

    const todoList = document.getElementById('todoList');
    const clearTodoBtn = document.getElementById('clearTodoBtn');


    let isRecording = false;
    let mediaRecorder;
    let socket;
    let currentSocketTranscript = "";
    let emailData = null;
    let googleAudioCtx = null;
    let googleProcessor = null;
    let googleMediaStream = null;
    let lastUserLang = 'en';

    function downsampleBuffer(buffer, inRate, outRate) {
      if (inRate === outRate) return buffer;
      const ratio = inRate / outRate;
      const outLen = Math.max(1, Math.round(buffer.length / ratio));
      const out = new Float32Array(outLen);
      for (let i = 0; i < outLen; i++) {
        out[i] = buffer[Math.min(Math.floor(i * ratio), buffer.length - 1)];
      }
      return out;
    }

    function floatTo16BitPCM(float32Array) {
      const out = new Int16Array(float32Array.length);
      for (let i = 0; i < float32Array.length; i++) {
        const s = Math.max(-1, Math.min(1, float32Array[i]));
        out[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
      }
      return out;
    }

    function cleanupGoogleAudio() {
      if (googleProcessor) {
        try { googleProcessor.disconnect(); } catch (e) { }
        googleProcessor = null;
      }
      if (googleAudioCtx) {
        try { googleAudioCtx.close(); } catch (e) { }
        googleAudioCtx = null;
      }
      if (googleMediaStream) {
        googleMediaStream.getTracks().forEach(t => t.stop());
        googleMediaStream = null;
      }
    }

    async function startRecording() {
      try {
        const cfg = await fetch('/api/stt-config').then(r => r.json());
        if (cfg.provider === 'google') {
          await startRecordingGoogle(cfg);
        } else {
          await startRecordingLocal();
        }
      } catch (e) {
        console.error('stt-config failed, using local', e);
        await startRecordingLocal();
      }
    }

    async function startRecordingLocal() {
      try {
        cleanupGoogleAudio();
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });

        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        socket = new WebSocket(`${protocol}//${window.location.host}/api/listen`);

        socket.onopen = () => {
          statusText.innerText = "Listening...";
          micBtn.classList.add('recording');
          isRecording = true;
          currentSocketTranscript = resetTranscriptCard();
          emailPreview.style.display = 'none';
          summaryCard.style.display = 'none';
          emailData = null;
          mediaRecorder.start(250);
        };

        mediaRecorder.addEventListener('dataavailable', event => {
          if (event.data.size > 0 && socket.readyState === WebSocket.OPEN) {
            socket.send(event.data);
          }
        });

        socket.onmessage = (event) => onListenMessage(event, stream);
        socket.onerror = () => onListenError(stream);
      } catch (err) {
        console.error("Microphone access denied", err);
        showToast("Please enable microphone permissions.", true);
        resetUI();
      }
    }

    async function startRecordingGoogle(cfg) {
      try {
        const TARGET = cfg.sampleRateHertz || 16000;
        mediaRecorder = null;
        googleMediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        googleAudioCtx = new AudioContext();
        const inRate = googleAudioCtx.sampleRate;
        const source = googleAudioCtx.createMediaStreamSource(googleMediaStream);
        googleProcessor = googleAudioCtx.createScriptProcessor(2048, 1, 1);
        const mute = googleAudioCtx.createGain();
        mute.gain.value = 0;

        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        socket = new WebSocket(`${protocol}//${window.location.host}/api/listen`);

        socket.onopen = () => {
          statusText.innerText = "Listening (Google)...";
          micBtn.classList.add('recording');
          isRecording = true;
          currentSocketTranscript = resetTranscriptCard();
          emailPreview.style.display = 'none';
          summaryCard.style.display = 'none';
          emailData = null;
          source.connect(googleProcessor);
          googleProcessor.connect(mute);
          mute.connect(googleAudioCtx.destination);
        };

        googleProcessor.onaudioprocess = (e) => {
          if (!isRecording || !socket || socket.readyState !== WebSocket.OPEN) return;
          const input = e.inputBuffer.getChannelData(0);
          const resampled = downsampleBuffer(input, inRate, TARGET);
          const pcm = floatTo16BitPCM(resampled);
          socket.send(pcm.buffer);
        };

        socket.onmessage = (event) => onListenMessage(event, null);
        socket.onerror = () => {
          showToast("Speech service error — check Google Cloud setup", true);
          resetUI();
          cleanupGoogleAudio();
        };
      } catch (err) {
        console.error(err);
        showToast("Microphone error", true);
        resetUI();
        cleanupGoogleAudio();
      }
    }

    function resetTranscriptCard() {
      transcriptBox.innerHTML = '<span class="placeholder" style="opacity:0.5">Listening...</span>';
      return "";
    }

    async function onListenMessage(event, stream) {
      const data = JSON.parse(event.data);
      if (!data.is_final) {
        currentSocketTranscript = data.transcript;
        if (data.transcript) {
          transcriptBox.innerHTML = data.transcript + '<span style="opacity:0.5">...</span>';
        }
        return;
      }
      if (stream) {
        stream.getTracks().forEach(t => t.stop());
      }
      cleanupGoogleAudio();
      const text = data.transcript || currentSocketTranscript;
      const lang = data.lang || "en";
      if (!text.trim()) {
        resetUI();
        speakLocalizedEnglish("Sorry, I didn't catch that.", lang);
        return;
      }
      transcriptBox.innerHTML = text;
      await parseCommand(text, lang);
    }

    function onListenError(stream) {
      console.error("WebSocket error");
      showToast("Microphone / speech connection error", true);
      resetUI();
      if (stream) {
        stream.getTracks().forEach(t => t.stop());
      }
      cleanupGoogleAudio();
    }

    function stopRecording() {
      if (!isRecording) return;
      statusText.innerText = "Processing...";
      micBtn.classList.remove('recording');
      isRecording = false;
      if (socket && socket.readyState === WebSocket.OPEN) {
        socket.send(JSON.stringify({ type: 'CloseStream' }));
      }
      if (mediaRecorder && mediaRecorder.state !== "inactive") {
        mediaRecorder.stop();
      }
      if (googleProcessor || googleAudioCtx) {
        setTimeout(() => cleanupGoogleAudio(), 400);
      }
    }

    async function parseCommand(finalTranscript, langCode) {
      statusText.innerText = "Thinking...";

      try {
        const response = await fetch('/api/parse-command', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ transcript: finalTranscript, lang: langCode })
        });

        if (!response.ok) throw new Error("Parse failed");
        const data = await response.json();
        const responseLang = data.lang || langCode;
        lastUserLang = responseLang;

        if (data.action === 'reply') {
          statusText.innerText = "Responded";
          transcriptBox.innerHTML += `<br><br><strong>Assistant:</strong> ${data.text}`;
          speakText(data.text, responseLang);

        } else if (data.action === 'send_email') {
          previewTo.innerText = data.to;
          previewSubject.innerText = data.subject;
          previewBody.innerHTML = data.body.replace(/\n/g, '<br>');
          statusText.innerText = "Preview ready";
          emailPreview.style.display = 'block';
          const vm = data.voice_message || 'Review the email and confirm to send.';
          speakText(vm, responseLang);

        } else if (data.action === 'add_todo') {
          const res = await fetch('/api/add-todo', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              transcript: finalTranscript,
              lang: responseLang,
              task_english: data.task || null
            })
          });
          const todoData = await res.json();
          updateTodoPanel(todoData.allTasks);
          let intro = "Task added to your list.";
          try {
            const tr = await fetch('/api/translate-text', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ text: intro, target_lang: responseLang })
            });
            const j = await tr.json();
            if (j.text) intro = j.text;
          } catch (e) { /* keep English */ }
          speakText(`${intro} ${todoData.task}`, responseLang);
          statusText.innerText = "Added!";
        }

      } catch (error) {
        console.error(error);
        speakLocalizedEnglish("Sorry, I couldn't understand that. Please try again.", lastUserLang);
        resetUI();
      }
    }

    micBtn.addEventListener('click', () => {
      ttsAudio.play().catch(() => { });

      if (!isRecording) {
        startRecording();
      } else {
        stopRecording();
      }
    });

    cancelBtn.addEventListener('click', () => {
      resetUI();
      transcriptBox.innerHTML = '<span class="placeholder">Your voice command will appear here...</span>';
    });

    summaryCancelBtn.addEventListener('click', () => {
      resetUI();
    });

    summaryCopyBtn.addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(summaryBody.innerText);
        showToast("Summary copied!");
      } catch (e) {
        showToast("Failed to copy", true);
      }
    });

    confirmBtn.addEventListener('click', async () => {
      ttsAudio.play().catch(() => { });

      const payload = {
        to: previewTo.innerText.trim(),
        subject: previewSubject.innerText.trim(),
        body: previewBody.innerText.trim()
      };

      if (!payload.to) {
        showToast("Recipient is required", true);
        return;
      }

      statusText.innerText = "Sending...";
      confirmBtn.disabled = true;
      confirmBtn.style.opacity = "0.5";

      try {
        const response = await fetch('/api/send-email', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (!response.ok) throw new Error("Send failed");

        showToast("Email sent!");
        await speakLocalizedEnglish("Your email has been sent successfully.", lastUserLang);
        resetUI();
        transcriptBox.innerHTML = '<span class="placeholder">Your voice command will appear here...</span>';

      } catch (error) {
        console.error(error);
        showToast("Failed to send email", true);
        statusText.innerText = "Error sending email";
      } finally {
        confirmBtn.disabled = false;
        confirmBtn.style.opacity = "1";
      }
    });

    function resetUI() {
      micBtn.classList.remove('recording');
      isRecording = false;
      statusText.innerText = "Ready";
      emailPreview.style.display = 'none';
      summaryCard.style.display = 'none';
      emailData = null;
      cleanupGoogleAudio();
    }

    clearTodoBtn.addEventListener('click', async () => {
      try {
        const res = await fetch('/api/todos', { method: 'DELETE' });
        const data = await res.json();
        updateTodoPanel(data.tasks);
        showToast("To-Do list cleared!");
      } catch (e) {
        console.error(e);
        showToast("Failed to clear list", true);
      }
    });

    async function loadTodos() {
      try {
        const res = await fetch('/api/todos');
        const data = await res.json();
        updateTodoPanel(data.tasks);
      } catch (e) { console.error(e); }
    }

    function updateTodoPanel(tasks) {
      todoList.innerHTML = tasks.length === 0 ? '<p style="opacity:0.5; font-size: 0.9rem;">List is empty</p>' : '';
      tasks.forEach(t => {
        const div = document.createElement('div');
        div.className = 'todo-item';
        div.innerHTML = `<input type="checkbox"> <span>${t}</span>`;
        todoList.appendChild(div);
      });
    }

    loadTodos();

    function showToast(message, isError = false) {
      toast.innerText = message;
      toast.className = `toast show ${isError ? 'error' : ''}`;
      setTimeout(() => {
        toast.className = 'toast';
      }, 3000);
    }

    function speakText(text, lang = "en") {
      ttsAudio.src = `/api/tts?text=${encodeURIComponent(text)}&lang=${encodeURIComponent(lang)}`;
      ttsAudio.play().catch(e => console.error("TTS playback failed", e));
    }

    async function speakLocalizedEnglish(enText, lang) {
      if (!lang || lang === 'en') {
        speakText(enText, 'en');
        return;
      }
      try {
        const r = await fetch('/api/translate-text', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text: enText, target_lang: lang })
        });
        const d = await r.json();
        speakText(d.text || enText, lang);
      } catch (e) {
        speakText(enText, 'en');
      }
    }
  </script>
</body>

</html>
